<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Semantic Document Search</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 0.95rem;
    }
    .badges {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-block;
      background: #1e3a5f;
      color: #60a5fa;
      font-size: 0.75rem;
      padding: 3px 10px;
      border-radius: 99px;
      border: 1px solid #2d5c8e;
    }

    .search-box {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 760px;
      margin-bottom: 24px;
    }
    .search-box input {
      flex: 1;
      padding: 14px 18px;
      font-size: 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #f1f5f9;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: #60a5fa; }
    .search-box input::placeholder { color: #64748b; }

    /* shared button base */
    .search-box button {
      padding: 14px 22px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s, opacity 0.2s;
    }

    #searchBtn {
      background: #2563eb;
      color: #ffffff;
    }
    #searchBtn:hover    { background: #1d4ed8; }
    #searchBtn:disabled { background: #1e3a5f; color: #64748b; cursor: not-allowed; }

    #reindexBtn {
      background: #854d0e;
      color: #fef08a;
      border: 1px solid #a16207;
      display: inline-flex;
      align-items: center;
      gap: 7px;
    }
    #reindexBtn:hover    { background: #713f12; }
    #reindexBtn:disabled { opacity: 0.45; cursor: not-allowed; }

    .spin-icon { display: inline-block; }
    #reindexBtn.spinning .spin-icon { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .suggestions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 16px;
      max-width: 760px;
    }
    .suggestions span {
      font-size: 0.8rem;
      color: #64748b;
      align-self: center;
    }
    .chip {
      padding: 5px 12px;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 99px;
      font-size: 0.8rem;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover { background: #334155; color: #f1f5f9; border-color: #60a5fa; }

    .reindex-msg {
      font-size: 0.82rem;
      color: #4ade80;
      min-height: 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    #status {
      font-size: 0.95rem;
      color: #64748b;
      margin-bottom: 20px;
      min-height: 22px;
      text-align: center;
    }

    .results-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 720px;
    }

    .result-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 20px 24px;
      transition: border-color 0.2s;
    }
    .result-card:hover { border-color: #60a5fa; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .rank {
      font-size: 0.75rem;
      font-weight: 700;
      color: #60a5fa;
      background: #1e3a5f;
      border: 1px solid #2d5c8e;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .score-bar-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .score-label {
      font-size: 0.8rem;
      color: #94a3b8;
      white-space: nowrap;
    }
    .score-bar {
      height: 6px;
      width: 100px;
      background: #334155;
      border-radius: 99px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 99px;
      transition: width 0.5s ease;
    }

    .doc-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 6px;
      font-family: monospace;
    }
    .snippet {
      font-size: 0.88rem;
      color: #94a3b8;
      line-height: 1.6;
    }

    .empty-msg {
      text-align: center;
      color: #64748b;
      font-size: 0.9rem;
      padding: 32px 0;
    }

    .error-msg {
      color: #f87171;
      background: #2d1515;
      border: 1px solid #7f1d1d;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 0.9rem;
      max-width: 640px;
      width: 100%;
    }

    footer {
      margin-top: 60px;
      color: #334155;
      font-size: 0.78rem;
      text-align: center;
    }

    @media (max-width: 540px) {
      body {
        padding: 32px 12px;
      }

      header h1 {
        font-size: 1.5rem;
      }

      /* Stack input on top, buttons side by side below */
      .search-box {
        flex-wrap: wrap;
      }
      .search-box input {
        flex: 1 1 100%;  /* input takes full row */
      }
      .search-box button {
        flex: 1;         /* buttons share the second row equally */
        font-size: 0.9rem;
        padding: 12px 10px;
      }

      /* Stack rank and score bar vertically inside the card */
      .card-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 8px;
      }

      .result-card {
        padding: 16px;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>🔍 Semantic Document Search</h1>
  <p>Custom TF-IDF + Cosine Similarity</p>
  <div class="badges">
    <span class="badge">51 documents · 51 topics</span>
    <span class="badge">TF-IDF</span>
    <span class="badge">Cosine Similarity</span>
  </div>
</header>

<div class="search-box">
  <input type="text" id="queryInput" placeholder="e.g. artificial intelligence in finance" />
  <button id="searchBtn" onclick="doSearch()">Search</button>
  <button id="reindexBtn" onclick="doReindex()">
    <span class="spin-icon">⟳</span> Rebuild Index
  </button>
</div>

<div class="suggestions">
  <span>Try:</span>
  <div class="chip" onclick="setQuery('artificial intelligence')">artificial intelligence</div>
  <div class="chip" onclick="setQuery('machine learning')">machine learning</div>
  <div class="chip" onclick="setQuery('deep learning')">deep learning</div>
  <div class="chip" onclick="setQuery('ai in robotics')">robotics</div>
  <div class="chip" onclick="setQuery('ai in finance')">finance</div>
  <div class="chip" onclick="setQuery('ai in education')">education</div>
</div>

<div class="reindex-msg" id="reindexMsg"></div>
<div id="status"></div>
<div id="results" class="results-grid"></div>

<footer>
  Semantic search engine · TF-IDF vectorization · Cosine similarity ranking
</footer>

<script>
  const input      = document.getElementById('queryInput');
  const searchBtn  = document.getElementById('searchBtn');
  const statusEl   = document.getElementById('status');
  const resultsEl  = document.getElementById('results');
  const reindexBtn = document.getElementById('reindexBtn');
  const reindexMsg = document.getElementById('reindexMsg');

  input.addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  function setQuery(text) {
    input.value = text;
    input.focus();
  }

  async function doSearch() {
    const query = input.value.trim();
    if (!query) {
      statusEl.textContent = 'Please enter a search query.';
      return;
    }

    searchBtn.disabled = true;
    searchBtn.textContent = 'Searching…';
    statusEl.textContent = 'Computing similarity…';
    resultsEl.innerHTML = '';

    try {
      const res  = await fetch(`/search?q=${encodeURIComponent(query)}`);
      const data = await res.json();

      if (!res.ok) {
        resultsEl.innerHTML = `<div class="error-msg">⚠️ ${data.detail || 'Search failed.'}</div>`;
        statusEl.textContent = '';
        return;
      }

      if (!data.results || data.results.length === 0) {
        statusEl.textContent = `No results for "${data.query}"`;
        resultsEl.innerHTML = `<div class="empty-msg">No matching documents found.<br>Try different keywords.</div>`;
        return;
      }

      statusEl.textContent = `Top ${data.results.length} results for "${data.query}"`;

      const topScore   = data.results[0].score || 1.0;
      const rankLabels = ['🥇 #1', '🥈 #2', '🥉 #3'];

      data.results.forEach((r, i) => {
        const barPct = topScore > 0 ? Math.round((r.score / topScore) * 100) : 0;
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <div class="card-header">
            <span class="rank">${rankLabels[i] || '#' + (i + 1)}</span>
            <div class="score-bar-wrap">
              <span class="score-label">Score: ${r.score.toFixed(4)}</span>
              <div class="score-bar">
                <div class="score-fill" style="width:0%" data-target="${barPct}"></div>
              </div>
            </div>
          </div>
          <div class="doc-name">📄 ${r.document}</div>
          <div class="snippet">${r.snippet}</div>
        `;
        resultsEl.appendChild(card);
      });

      requestAnimationFrame(() => {
        document.querySelectorAll('.score-fill').forEach(el => {
          el.style.width = el.dataset.target + '%';
        });
      });

    } catch (err) {
      resultsEl.innerHTML = `<div class="error-msg">⚠️ Could not reach the server. Is it running?</div>`;
      statusEl.textContent = '';
    } finally {
      searchBtn.disabled = false;
      searchBtn.textContent = 'Search';
    }
  }

  async function doReindex() {
    reindexBtn.disabled = true;
    reindexBtn.classList.add('spinning');
    reindexMsg.style.color = '#94a3b8';
    reindexMsg.textContent = 'Rebuilding index…';

    try {
      const res  = await fetch('/index', { method: 'POST' });
      const data = await res.json();
      reindexMsg.style.color = '#4ade80';
      reindexMsg.textContent = '✓ ' + data.message;
    } catch (err) {
      reindexMsg.style.color = '#f87171';
      reindexMsg.textContent = '✗ Rebuild failed. Is the server running?';
    } finally {
      reindexBtn.disabled = false;
      reindexBtn.classList.remove('spinning');
      setTimeout(() => { reindexMsg.textContent = ''; }, 3000);
    }
  }
</script>

</body>
</html>
